name: Build and Publish

on:
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python
        run: uv python install

      - name: Run Pytest
        run: uv run pytest

      - name: Build Package
        run: uv build

      - name: Archive Production Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            dist

      - name: Store version
        id: version
        # Using hatch as workaround since uv version cannot handle the dynamic version
        run: |
          echo "version=$(uvx hatch version)" >> $GITHUB_OUTPUT

  publish-to-pypi:
    needs: test-and-build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # IMPORTANT: this permission is mandatory for PyPI trusted publishing
      id-token: write

    steps:
      - name: Download a single artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      # uv publish (as of 0.11) only uploads pre-existing attestations; it does
      # not generate them (see astral-sh/uv#15618).
      # We keep using the official PyPA action, which generates PEP 740
      # PyPI Publish Attestations via Sigstore and uploads them alongside the
      # distributions.
      - name: Publish Package Distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  publish-to-ghcr:
    needs:
      - test-and-build
      - publish-to-pypi

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      # For uploading the container image attestation
      artifact-metadata: write

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          tags: |
            type=pep440,pattern={{version}}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and Push Container Image
        id: push
        uses: docker/build-push-action@v7.1.0
        with:
          context: "{{defaultContext}}"
          file: Docker/release.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            KCWARDEN_VERSION=${{ needs.test-and-build.outputs.version }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Log out from GitHub Container Registry
        run: docker logout ghcr.io
